name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Cairo + CJK font (for social card generation, incl. Chinese)
        run: sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev fonts-noto-cjk

      - name: Install dependencies
        run: pip install "mkdocs-material[imaging]" mkdocs-macros-plugin mkdocs-git-revision-date-localized-plugin mkdocs-panzoom-plugin mkdocs-static-i18n

      - name: Build and deploy
        run: mkdocs gh-deploy --force
